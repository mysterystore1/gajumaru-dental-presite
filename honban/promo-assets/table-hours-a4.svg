<svg viewBox="0 0 560 196" xmlns="http://www.w3.org/2000/svg" font-family="'Yu Gothic','Meiryo','Noto Sans JP',sans-serif">
<rect x="0" y="0" width="560" height="196" fill="#FFFDF9"/>

<!-- header fill -->
<rect x="72" y="4" width="484" height="34" fill="#FBE3D6"/>
<rect x="4" y="4" width="68" height="34" fill="#F4ECDD"/>

<!-- outer + grid（7列＝月火水木金土日。祝列は廃止し注記に集約）-->
<g stroke="#E3B23C" stroke-width="1.4" fill="none">
<rect x="4" y="4" width="552" height="148"/>
<line x1="72" y1="4" x2="72" y2="152"/>
<line x1="4" y1="38" x2="556" y2="38"/>
<line x1="4" y1="95" x2="556" y2="95"/>
<line x1="141.1" y1="4" x2="141.1" y2="152"/>
<line x1="210.3" y1="4" x2="210.3" y2="152"/>
<line x1="279.4" y1="4" x2="279.4" y2="152"/>
<line x1="348.6" y1="4" x2="348.6" y2="152"/>
<line x1="417.7" y1="4" x2="417.7" y2="152"/>
<line x1="486.9" y1="4" x2="486.9" y2="152"/>
</g>

<!-- header day labels -->
<g font-size="20" font-weight="700" fill="#9A3C1C" text-anchor="middle">
<text x="106.6" y="28">月</text><text x="175.7" y="28">火</text><text x="244.9" y="28">水</text><text x="314" y="28">木</text><text x="383.1" y="28">金</text><text x="452.3" y="28">土</text><text x="521.4" y="28">日</text>
</g>

<!-- row labels -->
<g font-size="18" font-weight="700" fill="#6B4326" text-anchor="middle">
<text x="38" y="72">午前</text><text x="38" y="129">午後</text>
</g>

<!-- 午前 row: ○ 休 ○ ○ ○ △ △（土日は通し診療＝△）-->
<g font-size="22" text-anchor="middle">
<text x="106.6" y="73" fill="#C5552B">○</text><text x="175.7" y="73" fill="#9A8E7E">休</text><text x="244.9" y="73" fill="#C5552B">○</text><text x="314" y="73" fill="#C5552B">○</text><text x="383.1" y="73" fill="#C5552B">○</text><text x="452.3" y="73" fill="#C5552B">△</text><text x="521.4" y="73" fill="#C5552B">△</text>
</g>
<!-- 午後 row: ○ 休 ○ ○ ○ △ △（土日は通し診療＝△）-->
<g font-size="22" text-anchor="middle">
<text x="106.6" y="130" fill="#C5552B">○</text><text x="175.7" y="130" fill="#9A8E7E">休</text><text x="244.9" y="130" fill="#C5552B">○</text><text x="314" y="130" fill="#C5552B">○</text><text x="383.1" y="130" fill="#C5552B">○</text><text x="452.3" y="130" fill="#C5552B">△</text><text x="521.4" y="130" fill="#C5552B">△</text>
</g>

<!-- note -->
<text x="6" y="174" font-size="15" fill="#6B4326">土日は9:00-14:20の通し診療（昼休みなし）　休診：火曜・祝日</text>
