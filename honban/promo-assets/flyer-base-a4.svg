<text x="34" y="588" fill="#3A2E26" font-size="14" font-weight="700">診療内容</text>
<rect x="34" y="598" width="527" height="56" rx="10" fill="#F7FAF4" stroke="#E1E9D8" stroke-width="1"/>
<text x="50" y="620" fill="#3A2E26" font-size="10.5">・一般歯科</text>
<text x="50" y="642" fill="#3A2E26" font-size="10.5">・歯周病治療</text>
<text x="190" y="620" fill="#3A2E26" font-size="10.5">・小児歯科</text>
<text x="190" y="642" fill="#3A2E26" font-size="10.5">・予防歯科</text>
<text x="330" y="620" fill="#3A2E26" font-size="10.5">・マタニティ歯科</text>
<text x="330" y="642" fill="#3A2E26" font-size="10.5">・ホワイトニング（自費）</text>
