<svg viewBox="0 0 600 470" xmlns="http://www.w3.org/2000/svg" font-family="'Yu Gothic','Meiryo','Noto Sans JP',sans-serif">
<rect x="0" y="0" width="600" height="470" fill="#EFEBE1"/>

<!-- blocks -->
<g fill="#E4DFD2">
<rect x="40" y="150" width="110" height="70" rx="4"/><rect x="170" y="150" width="90" height="70" rx="4"/>
<rect x="340" y="150" width="90" height="60" rx="4"/><rect x="450" y="150" width="110" height="70" rx="4"/>
<rect x="40" y="250" width="90" height="60" rx="4"/><rect x="450" y="250" width="110" height="60" rx="4"/>
</g>
<!-- park -->
<rect x="60" y="40" width="150" height="80" rx="6" fill="#CFE0B8"/>
<text x="135" y="86" font-size="17" fill="#4F6B3A" text-anchor="middle">辻堂高砂西公園</text>

<!-- roads -->
<rect x="0" y="330" width="600" height="46" fill="#FBFAF7"/>
<rect x="270" y="0" width="40" height="330" fill="#FBFAF7"/>
<rect x="0" y="230" width="600" height="22" fill="#FBFAF7"/>
<!-- route 30 shield -->
<rect x="486" y="343" width="46" height="22" rx="4" fill="#3E78C2"/>
<text x="509" y="359" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">30</text>
<text x="60" y="358" font-size="14" fill="#5A6E86">県道30号</text>

<!-- 高砂歩道橋 -->
<rect x="300" y="328" width="36" height="50" rx="3" fill="none" stroke="#B7A98E" stroke-width="2"/>
<text x="318" y="396" font-size="12" fill="#6B4326" text-anchor="middle">高砂歩道橋</text>

<!-- bus stop 高砂 -->
<circle cx="232" cy="352" r="12" fill="#3E78C2"/>
<text x="232" y="357" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">B</text>
<text x="232" y="300" font-size="14" font-weight="700" fill="#2E5E9E" text-anchor="middle">バス停「高砂」</text>
<text x="232" y="320" font-size="13" font-weight="700" fill="#C5552B" text-anchor="middle">徒歩約1分</text>

<!-- OK store -->
<rect x="430" y="388" width="140" height="62" rx="6" fill="#E0D7C2" stroke="#C9BC9E"/>
<text x="500" y="424" font-size="17" font-weight="700" fill="#6B4326" text-anchor="middle">オーケー 辻堂店</text>

<!-- 小学校 -->
<rect x="60" y="388" width="150" height="62" rx="6" fill="#E4DFD2"/>
<text x="135" y="424" font-size="16" fill="#6B4326" text-anchor="middle">高砂小学校</text>

<!-- clinic pin -->
<path d="M330 210 a34 34 0 1 0 -0.1 0 l-17 30 z" fill="#C5552B"/>
<circle cx="313" cy="176" r="15" fill="#FFFFFF"/>
<path d="M313 168 q9 0 9 8 q0 7 -9 12 q-9 -5 -9 -12 q0 -8 9 -8 z" fill="#7CA45F"/>
<rect x="196" y="250" width="234" height="30" rx="6" fill="#C5552B"/>
<text x="313" y="271" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">辻堂がじゅまる歯科</text>

<!-- to station arrow -->
<g>
<path d="M470 90 l0 -50 l-12 0 l18 -26 l18 26 l-12 0 l0 50 z" fill="#C5552B"/>
<text x="476" y="118" font-size="15" font-weight="700" fill="#C5552B" text-anchor="middle">辻堂駅へ</text>
<text x="476" y="138" font-size="14" font-weight="700" fill="#C5552B" text-anchor="middle">車で約3分</text>
</g>

<!-- compass -->
<circle cx="40" cy="36" r="18" fill="#FFFDF9" stroke="#C9BC9E"/>
<path d="M40 22 l6 14 l-6 -4 l-6 4 z" fill="#C5552B"/>
<text x="40" y="50" font-size="11" font-weight="700" fill="#6B4326" text-anchor="middle">N</text>
</svg>
