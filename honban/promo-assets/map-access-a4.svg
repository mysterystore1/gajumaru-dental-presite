<svg viewBox="0 0 600 470" xmlns="http://www.w3.org/2000/svg" font-family="'Yu Gothic','Meiryo','Noto Sans JP',sans-serif">
<rect x="0" y="0" width="600" height="470" fill="#EFEBE1"/>

<!-- light blocks -->
<g fill="#E4DFD2">
<rect x="430" y="150" width="130" height="60" rx="4"/>
<rect x="40" y="255" width="120" height="55" rx="4"/>
<rect x="430" y="255" width="130" height="55" rx="4"/>
</g>

<!-- park (west) -->
<rect x="40" y="150" width="150" height="80" rx="6" fill="#CFE0B8"/>
<text x="115" y="186" font-size="15" fill="#4F6B3A" text-anchor="middle">辻堂高砂</text>
<text x="115" y="206" font-size="15" fill="#4F6B3A" text-anchor="middle">西公園</text>

<!-- roads -->
<rect x="0" y="328" width="600" height="46" fill="#FBFAF7"/>
<rect x="286" y="0" width="38" height="328" fill="#FBFAF7"/>
<!-- route 30 -->
<rect x="486" y="343" width="46" height="22" rx="4" fill="#3E78C2"/>
<text x="509" y="359" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">30</text>
<text x="40" y="358" font-size="15" fill="#5A6E86">国道30号</text>

<!-- bus stop 高砂 -->
<circle cx="185" cy="351" r="12" fill="#3E78C2"/>
<text x="185" y="356" font-size="13" font-weight="700" fill="#FFF" text-anchor="middle">B</text>
<text x="185" y="298" font-size="14" font-weight="700" fill="#2E5E9E" text-anchor="middle">バス停「高砂」</text>
<text x="185" y="318" font-size="13" font-weight="700" fill="#C5552B" text-anchor="middle">徒歩約1分</text>

<!-- OK store (SE) -->
<rect x="420" y="388" width="160" height="62" rx="6" fill="#E0D7C2" stroke="#C9BC9E"/>
<text x="500" y="416" font-size="16" font-weight="700" fill="#6B4326" text-anchor="middle">オーケー</text>
<text x="500" y="436" font-size="16" font-weight="700" fill="#6B4326" text-anchor="middle">辻堂店</text>

<!-- Lawson (SW) -->
<rect x="40" y="388" width="160" height="62" rx="6" fill="#E4DFD2"/>
<text x="120" y="416" font-size="14" fill="#6B4326" text-anchor="middle">ローソン</text>
<text x="120" y="436" font-size="14" fill="#6B4326" text-anchor="middle">辻堂六丁目店</text>

<!-- cycle base asahi (just south of pin) -->
<rect x="255" y="296" width="185" height="28" rx="5" fill="#E4DFD2"/>
<text x="347" y="315" font-size="13" fill="#6B4326" text-anchor="middle">サイクルベースあさひ</text>

<!-- clinic pin -->
<g transform="translate(47,10)">
<path d="M330 210 a34 34 0 1 0 -0.1 0 l-17 30 z" fill="#C5552B"/>
<circle cx="313" cy="176" r="15" fill="#FFFFFF"/>
<path d="M313 168 q9 0 9 8 q0 7 -9 12 q-9 -5 -9 -12 q0 -8 9 -8 z" fill="#7CA45F"/>
</g>
<rect x="243" y="256" width="234" height="30" rx="6" fill="#C5552B"/>
<text x="360" y="277" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">辻堂がじゅまる歯科</text>

<!-- parking -->
<rect x="412" y="170" width="34" height="32" rx="4" fill="#3E78C2"/>
<text x="429" y="193" font-size="18" font-weight="700" fill="#FFF" text-anchor="middle">P</text>
<text x="429" y="222" font-size="13" font-weight="700" fill="#6B4326" text-anchor="middle">駐車場2台</text>

<!-- to station arrow (north) -->
<g>
<path d="M470 92 l0 -52 l-12 0 l18 -26 l18 26 l-12 0 l0 52 z" fill="#C5552B"/>
<text x="476" y="120" font-size="15" font-weight="700" fill="#C5552B" text-anchor="middle">辻堂駅へ</text>
<text x="476" y="140" font-size="14" font-weight="700" fill="#C5552B" text-anchor="middle">車で約3分</text>
</g>

<!-- compass -->
<circle cx="40" cy="36" r="18" fill="#FFFDF9" stroke="#C9BC9E"/>
<path d="M40 22 l6 14 l-6 -4 l-6 4 z" fill="#C5552B"/>
<text x="40" y="50" font-size="11" font-weight="700" fill="#6B4326" text-anchor="middle">N</text>
</svg>
