<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 80" fill="none">
  <!-- あくび猫（がじゅまる=由来の子猫。gajumaru-tree-cat.svg の子猫と同座標系・目と口だけあくびに） -->
  <!-- スタイル: サイト共通の線画言語（線 #9C5026 / 塗り #FBF6F0・#F7E8DB / 頬 #F0DAC8） -->
  <!-- しっぽ（くるん） -->
  <path d="M58,68 C72,65 75,52 65,47" stroke="#9C5026" stroke-width="4.5" stroke-linecap="round"/>
  <!-- 体（おすわり） -->
  <path d="M36,36 C28,46 24,58 25,70 C25,73 27,74 30,74 L53,74 C56,74 58,73 58,70 C58,58 54,46 48,36 Z" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M45,74 L45,63" stroke="#9C5026" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <!-- 耳 -->
  <path d="M33,22 L29,9 L40,14 Z" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M45.5,17.5 L52,7.5 L54.5,19 Z" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 頭 -->
  <circle cx="42" cy="27" r="10.5" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.5"/>
  <!-- 目（ぎゅっと閉じる） -->
  <path d="M36,24 C37.3,25.4 39.2,25.4 40.5,24" stroke="#9C5026" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M44.5,23 C45.8,24.4 47.7,24.4 49,23" stroke="#9C5026" stroke-width="1.4" stroke-linecap="round"/>
  <!-- あくびの口 -->
  <ellipse cx="42.5" cy="30.5" rx="3" ry="3.9" fill="#F7E8DB" stroke="#9C5026" stroke-width="1.6"/>
  <!-- 頬 -->
  <ellipse cx="35.5" cy="28.5" rx="2.4" ry="1.6" fill="#F0DAC8"/>
  <ellipse cx="49.5" cy="27" rx="2.4" ry="1.6" fill="#F0DAC8"/>
  <!-- ねむけの葉ひとひら -->
  <g transform="rotate(26 76 16)" opacity="0.6">
    <path d="M76,22 C73.8,19 73.8,14.5 76,11.5 C78.2,14.5 78.2,19 76,22 Z" fill="#F7E8DB" stroke="#9C5026" stroke-width="1.4"/>
    <path d="M76,20.5 L76,13" stroke="#9C5026" stroke-width="0.9"/>
  </g>
</svg>
