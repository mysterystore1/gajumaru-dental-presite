<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" role="img" aria-labelledby="camTitle camDesc" font-family="'Zen Maru Gothic','Noto Sans JP',sans-serif">
  <title id="camTitle">口腔内カメラで、その場で一緒に見る</title>
  <desc id="camDesc">小型のカメラでお口の中を撮影し、その映像をモニターに映します。歯科医師と患者さまが、同じ画面を見ながら状態を確認できます。</desc>

  <!-- 左: ペン型カメラ -->
  <g transform="translate(40,70)">
    <rect x="0" y="40" width="110" height="20" rx="10" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.4"/>
    <rect x="98" y="36" width="22" height="28" rx="6" fill="#F2DCCB" stroke="#9C5026" stroke-width="2.4"/>
    <circle cx="109" cy="50" r="5" fill="#C56A38"/>
    <!-- 撮影ビーム -->
    <path d="M126 50 H150" stroke="#C9A98C" stroke-width="2" stroke-dasharray="4 4"/>
    <!-- 小さな歯 -->
    <path d="M170 26 C160 26 154 34 156 50 C157 62 162 74 167 82 C170 87 176 86 177 78 L179 66 C179 63 181 63 181 66 L183 78 C184 86 190 87 193 82 C198 74 203 62 204 50 C206 34 200 26 190 26 C184 26 181 30 181 30 Z" fill="#FFFFFF" stroke="#9C5026" stroke-width="2.4"/>
    <text x="100" y="116" text-anchor="middle" font-size="14" fill="#6E645A">小型カメラでお口を撮影</text>
  </g>

  <!-- 矢印 -->
  <g transform="translate(290,100)">
    <path d="M0 12 H52 M40 2 L54 12 L40 22" fill="none" stroke="#C56A38" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 右: モニターに映して一緒に見る -->
  <g transform="translate(380,40)">
    <!-- モニター -->
    <rect x="40" y="20" width="180" height="118" rx="8" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.6"/>
    <rect x="52" y="32" width="156" height="84" rx="4" fill="#F7E8DB"/>
    <!-- 拡大された歯 -->
    <path d="M118 44 C103 44 95 56 98 78 C100 94 108 104 114 110 C118 115 126 113 127 104 L130 88 C130.5 84 133.5 84 134 88 L137 104 C138 113 146 115 150 110 C156 104 164 94 166 78 C169 56 161 44 146 44 C137 44 132 50 132 50 Z" fill="#FFFFFF" stroke="#C56A38" stroke-width="3"/>
    <!-- スタンド -->
    <rect x="124" y="138" width="12" height="16" fill="#E9C2A6" stroke="#9C5026" stroke-width="2"/>
    <rect x="104" y="152" width="52" height="8" rx="3" fill="#E9C2A6" stroke="#9C5026" stroke-width="2"/>
    <text x="130" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#9C5026">同じ画面を、一緒に見る</text>
  </g>
</svg>
