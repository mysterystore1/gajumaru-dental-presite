<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 56" fill="none">
  <!-- 落ち葉（舞い落ちる一枚＋地面の三枚。右へ行くほど薄く=pawprintsと同じ濃淡法） -->
  <!-- スタイル: サイト共通の線画言語（線 #9C5026 / 塗り #F7E8DB・葉脈つき） -->
  <!-- 舞い落ちる一枚 -->
  <g transform="rotate(58 28 16)" opacity="0.55">
    <path d="M28,24 C25.5,20.5 25.5,15.5 28,12 C30.5,15.5 30.5,20.5 28,24 Z" fill="#F7E8DB" stroke="#9C5026" stroke-width="1.5"/>
    <path d="M28,22.5 L28,13.5" stroke="#9C5026" stroke-width="0.9"/>
  </g>
  <!-- 風の線 -->
  <path d="M10,34 C18,30 30,30 38,34" stroke="#9C5026" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <!-- 地面に落ちた葉 -->
  <g transform="rotate(86 62 42)" opacity="0.5">
    <path d="M62,50 C59.5,46.5 59.5,41.5 62,38 C64.5,41.5 64.5,46.5 62,50 Z" fill="#F7E8DB" stroke="#9C5026" stroke-width="1.5"/>
    <path d="M62,48.5 L62,39.5" stroke="#9C5026" stroke-width="0.9"/>
  </g>
  <g transform="rotate(-78 102 44)" opacity="0.42">
    <path d="M102,52 C99.5,48.5 99.5,43.5 102,40 C104.5,43.5 104.5,48.5 102,52 Z" fill="#F7E8DB" stroke="#9C5026" stroke-width="1.5"/>
    <path d="M102,50.5 L102,41.5" stroke="#9C5026" stroke-width="0.9"/>
  </g>
  <g transform="rotate(70 138 40)" opacity="0.34">
    <path d="M138,48 C135.8,45 135.8,40.5 138,37.5 C140.2,40.5 140.2,45 138,48 Z" fill="#F7E8DB" stroke="#9C5026" stroke-width="1.4"/>
    <path d="M138,46.5 L138,39" stroke="#9C5026" stroke-width="0.9"/>
  </g>
</svg>
