<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" aria-labelledby="ctTitle ctDesc" font-family="'Zen Maru Gothic','Noto Sans JP',sans-serif">
  <title id="ctTitle">平面のレントゲンと、立体の歯科用CT</title>
  <desc id="ctDesc">ふつうのレントゲンは平面（2次元）で、歯や骨が重なって見えにくいことがあります。歯科用CTは立体（3次元）で、位置や奥行き、向きまで確かめられます。</desc>

  <!-- 左: 平面レントゲン(2D) -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="180" height="130" rx="8" fill="#F4ECE0" stroke="#C9A98C" stroke-width="2"/>
    <!-- 重なって見える2本の歯 -->
    <path d="M70 28 C58 28 52 38 54 56 C55 70 60 86 66 96 C69 101 75 100 76 92 L78 76 C78 73 80 73 80 76 L82 92 C83 100 89 101 92 96 C98 86 103 70 104 56 C106 38 100 28 88 28 C82 28 79 33 79 33 Z" fill="none" stroke="#9C5026" stroke-width="2.4"/>
    <path d="M96 30 C84 30 78 40 80 58 C81 72 86 88 92 98 C95 103 101 102 102 94 L104 78 C104 75 106 75 106 78 L108 94 C109 102 115 103 118 98 C124 88 129 72 130 58 C132 40 126 30 114 30 Z" fill="none" stroke="#9C5026" stroke-width="2.4" opacity="0.55"/>
    <text x="90" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#9C5026">平面レントゲン</text>
    <text x="90" y="170" text-anchor="middle" font-size="12.5" fill="#6E645A">2次元・重なって見えにくい</text>
  </g>

  <!-- 矢印 -->
  <g transform="translate(285,95)">
    <path d="M0 15 H58 M46 5 L60 15 L46 25" fill="none" stroke="#C56A38" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 右: 立体CT(3D・簡易キューブ) -->
  <g transform="translate(395,34)">
    <!-- キューブ -->
    <path d="M30 40 L120 40 L150 18 L60 18 Z" fill="#F2DCCB" stroke="#9C5026" stroke-width="2"/>
    <path d="M120 40 L150 18 L150 110 L120 132 Z" fill="#E9C2A6" stroke="#9C5026" stroke-width="2"/>
    <rect x="30" y="40" width="90" height="92" fill="#FBF6F0" stroke="#9C5026" stroke-width="2"/>
    <!-- 立体的に見える歯(前面) -->
    <path d="M75 56 C64 56 58 64 60 80 C61 92 66 106 71 114 C74 119 80 118 81 110 L83 96 C83 93 85 93 85 96 L87 110 C88 118 94 119 97 114 C102 106 107 92 108 80 C110 64 104 56 93 56 C87 56 84 60 84 60 Z" fill="#FFFFFF" stroke="#C56A38" stroke-width="2.4"/>
    <!-- 回転を示す矢印 -->
    <path d="M150 130 A40 18 0 0 1 70 138" fill="none" stroke="#C56A38" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M74 130 L70 139 L80 140" fill="none" stroke="#C56A38" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="92" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#9C5026">歯科用CT（立体）</text>
    <text x="92" y="194" text-anchor="middle" font-size="12.5" fill="#6E645A">3次元・位置や奥行きまで</text>
  </g>
</svg>
