<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 80" fill="none">
  <!-- おすわり猫 v2（がじゅまる由来の子猫。cat-yawn と同座標系・同キャラ仕様） -->
  <!-- スタイル: サイト共通の線画言語（線 #9C5026 / 塗り #FBF6F0・#F7E8DB / 頬・内耳 #F0DAC8） -->
  <!-- しっぽ（テーパー付きの巻き・輪郭塗りつぶし） -->
  <path d="M56,70 C68,70.5 77,63 76.5,53 C76.2,46.5 70.5,42.5 65.5,45 C62,46.8 61.5,51 64.5,52.6 C68.5,54.6 70.8,56.8 69.3,60 C66.3,65 61,66.4 56,66.2 Z" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- 体（おすわり・胸のカーブと腰の張り） -->
  <path d="M36,36 C29.5,44.5 25.5,55.5 25.5,67.5 C25.5,71.5 27.5,73.5 31,73.5 L51,73.5 C55.5,73.5 58.5,71.5 59.5,67 C61.5,57.5 58.5,46.5 51,37 Z" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 後ろ足（腰）のライン -->
  <path d="M52.5,72.5 C57.5,67 58.8,57.5 53.5,48.5" stroke="#9C5026" stroke-width="1.7" stroke-linecap="round" opacity="0.45"/>
  <!-- 前足のライン -->
  <path d="M40.5,73.5 C40,69 40,64.5 40.8,61" stroke="#9C5026" stroke-width="1.7" stroke-linecap="round" opacity="0.45"/>
  <!-- 耳（直線禁止・曲線の三角、左右非対称） -->
  <path d="M33.5,21.5 C31,17 29.5,12.5 29.8,9 C33.5,10 37.5,12 40.2,14.6 Z" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M45.8,17.2 C47.5,13 50,9.2 52.6,7.4 C54.2,10.8 55,15.2 54.8,19 Z" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- 内耳 -->
  <path d="M34.6,17.8 C33.6,15.6 33,13.6 33.1,12.2 C34.9,12.9 36.7,14 38,15.4 Z" fill="#F0DAC8"/>
  <path d="M48.2,15.2 C49.1,13 50.3,11 51.5,10 C52.3,11.9 52.8,14.1 52.8,16 Z" fill="#F0DAC8"/>
  <!-- 頭（真円でない有機的な輪郭・わずかな傾き） -->
  <path d="M31.4,25.2 C31.9,19.6 36.6,15.9 42.4,16.4 C48.2,16.9 52.9,21.4 52.4,27.2 C51.9,33 46.9,37.3 41.1,36.8 C35.3,36.3 30.9,30.9 31.4,25.2 Z" fill="#FBF6F0" stroke="#9C5026" stroke-width="2.5"/>
  <!-- 点目 -->
  <circle cx="37.6" cy="25" r="1.6" fill="#9C5026"/>
  <circle cx="46.6" cy="24.4" r="1.6" fill="#9C5026"/>
  <!-- ω口 -->
  <path d="M40.4,28.6 C41.1,29.7 42.1,29.8 42.4,28.8 C42.8,29.8 43.8,29.8 44.4,28.7" stroke="#9C5026" stroke-width="1.3" stroke-linecap="round"/>
  <!-- 頬 -->
  <ellipse cx="35.2" cy="29" rx="2.4" ry="1.6" fill="#F0DAC8"/>
  <ellipse cx="49" cy="28" rx="2.4" ry="1.6" fill="#F0DAC8"/>
  <!-- ひげ -->
  <path d="M30.5,26.5 C28.5,26.7 26.7,27.1 25.2,27.7 M30.8,29.3 C29,30 27.4,30.8 26.2,31.7" stroke="#9C5026" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <path d="M53.3,25.4 C55.3,25.3 57.1,25.5 58.7,25.9 M53.2,28.2 C55,28.7 56.6,29.4 57.9,30.2" stroke="#9C5026" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
</svg>
